version: '3.8' # Docker Compose 파일의 규격 버전 (최신 프로젝트에서 많이 씀)

services:
  # ==========================================
  # 1. 데이터베이스 컨테이너 (MariaDB)
  # ==========================================
  project-db:
    image: mariadb:10.11  # 안정적인 버전을 명시해 주는 것이 좋습니다.
    container_name: project-db
    restart: always       # 서버가 켜지면 무조건 다시 켜라! (24시간 가동의 핵심)
    ports:
      - "3306:3306"       # 내 컴퓨터의 3306 포트를 컨테이너의 3306 포트와 연결
    environment:
      MYSQL_ROOT_PASSWORD: mysql12#$ # DB 루트 비밀번호 설정
      MYSQL_DATABASE: asap           # 컨테이너가 켜질 때 'asap' 이라는 DB를 자동으로 생성
    volumes:
      - db_data:/var/lib/mysql       # [매우 중요] DB 데이터 영구 보존! (컨테이너 지워져도 데이터 안 날아감)

  # ==========================================
  # 2. 캐시 메모리 컨테이너 (Redis) - 임시 추가
  # ==========================================
  asap-redis:
    image: redis:alpine   # 가벼운 alpine 버전 사용
    container_name: asap-redis
    restart: always
    ports:
      - "6379:6379"

  # ==========================================
  # 3. 스프링부트 컨테이너 (우리가 만든 앱)
  # ==========================================
  project-app:
    build: .              # [핵심] 현재 폴더의 Dockerfile을 읽어서 니가 직접 이미지 구워라!
    container_name: project-app
    restart: always
    ports:
      - "8080:8080"       # 외부에서 8080으로 접속하면 스프링부트로 연결
    depends_on:           # 실행 순서 보장 (DB랑 Redis가 먼저 켜진 다음에 앱을 켜라)
      - project-db
      - asap-redis
    environment:          # [꿀팁] application.yml의 설정을 여기서 덮어쓸 수 있습니다!
      SPRING_DATASOURCE_URL: jdbc:mysql://project-db:3306/asap?characterEncoding=UTF-8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mysql12#$
      SPRING_DATA_REDIS_HOST: asap-redis
      SPRING_DATA_REDIS_PORT: 6379

# 볼륨 선언 (위에 DB에서 쓴 볼륨을 도커에 등록하는 과정)
volumes:
  db_data: